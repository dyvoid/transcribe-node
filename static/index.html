<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>TranscribeNode</title>
  <style>
    :root { color-scheme: dark; }
    * { box-sizing: border-box; }
    body {
      margin: 0; font-family: system-ui, sans-serif; background: #0f1115; color: #e6e6e6;
      display: flex; flex-direction: column; min-height: 100vh;
    }
    header { padding: 16px 24px; border-bottom: 1px solid #262a33; }
    header h1 { margin: 0; font-size: 18px; }
    header .sub { color: #8b93a1; font-size: 13px; margin-top: 4px; }
    main { flex: 1; display: flex; flex-direction: column; gap: 16px; padding: 24px; max-width: 900px; width: 100%; margin: 0 auto; }
    .zone { background: #171a21; border: 1px solid #262a33; border-radius: 10px; padding: 16px; }
    .zone h2 { margin: 0 0 12px; font-size: 14px; text-transform: uppercase; letter-spacing: .05em; color: #8b93a1; }
    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    th, td { text-align: left; padding: 6px 8px; border-bottom: 1px solid #21252e; }
    th { color: #8b93a1; font-weight: 500; }
    tr.model-row { cursor: pointer; }
    tr.model-row.selected { background: #1d2a44; }
    tr.model-row.recommended td:first-child::after { content: " ★ recommended"; color: #7dd3fc; font-size: 11px; }
    .fields { display: flex; gap: 16px; flex-wrap: wrap; margin-top: 12px; }
    .field { display: flex; flex-direction: column; gap: 4px; font-size: 13px; }
    .field label { color: #8b93a1; }
    input, select { background: #0f1115; color: #e6e6e6; border: 1px solid #333a47; border-radius: 6px; padding: 6px 8px; font-size: 13px; }
    .controls { display: flex; align-items: center; gap: 16px; }
    button { background: #2563eb; color: white; border: 0; border-radius: 8px; padding: 12px 28px; font-size: 15px; cursor: pointer; }
    button.stop { background: #b91c1c; }
    button:disabled { opacity: .5; cursor: default; }
    .state { font-size: 13px; color: #8b93a1; }
    .dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 6px; background: #6b7280; }
    .dot.loaded { background: #22c55e; } .dot.loading { background: #eab308; } .dot.idle { background: #6b7280; }
    #log { font-family: ui-monospace, monospace; font-size: 12px; max-height: 260px; overflow-y: auto; }
    #log .entry { padding: 4px 0; border-bottom: 1px solid #21252e; display: flex; gap: 12px; }
    #log .ok { color: #22c55e; } #log .error { color: #ef4444; }
    .empty { color: #6b7280; font-size: 13px; }

    /* Panel active/inactive lifecycle (ADR 0005): non-interactive, header-only when collapsed. */
    .zone.collapsed { opacity: .45; }
    .zone.collapsed .zone-body { display: none; }
    .zone.collapsed h2 { margin: 0; }
    .zone.collapsed h2::after { content: attr(data-collapsed-hint); color: #6b7280; font-size: 11px; text-transform: none; letter-spacing: normal; margin-left: 8px; }
    .zone.locked .zone-body { pointer-events: none; }

    .drop { border: 1px dashed #3a4150; border-radius: 8px; padding: 24px; text-align: center; color: #8b93a1; font-size: 13px; cursor: pointer; transition: border-color .15s, background .15s; }
    .drop.over { border-color: #2563eb; background: #14203a; color: #cbd5e1; }
    .drop strong { color: #e6e6e6; }
    button.secondary { background: #2a2f3a; padding: 8px 16px; font-size: 13px; }
    #tResult { margin-top: 16px; }
    #tResult pre { background: #0f1115; border: 1px solid #262a33; border-radius: 8px; padding: 12px; font-family: ui-monospace, monospace; font-size: 12px; max-height: 300px; overflow: auto; white-space: pre-wrap; word-break: break-word; margin: 8px 0 0; }
    #tResult .actions { display: flex; gap: 8px; margin-top: 8px; }
    #tStatus { font-size: 13px; color: #8b93a1; margin-top: 12px; }
  </style>
</head>
<body>
  <header>
    <h1>TranscribeNode</h1>
    <div class="sub" id="hw">Detecting hardware…</div>
  </header>
  <main>
    <section class="zone" id="settingsZone">
      <h2 data-collapsed-hint="locked while engine is running">Settings</h2>
      <div class="zone-body">
        <table id="models">
          <thead>
            <tr><th>Model</th><th>VRAM</th><th>Quality</th><th>Use case</th></tr>
          </thead>
          <tbody></tbody>
        </table>
        <div class="fields">
          <div class="field">
            <label for="language">Language</label>
            <input id="language" placeholder="auto" />
          </div>
          <div class="field">
            <label for="format">Response format</label>
            <select id="format">
              <option>json</option><option>text</option><option>srt</option>
              <option>vtt</option><option>verbose_json</option>
            </select>
          </div>
          <div class="field">
            <label for="port">Port</label>
            <input id="port" disabled />
          </div>
        </div>
      </div>
    </section>

    <section class="zone">
      <h2>Engine</h2>
      <div class="zone-body">
        <div class="controls">
          <button id="toggle" disabled>Start</button>
          <span class="state"><span class="dot idle" id="dot"></span><span id="stateText">idle</span></span>
        </div>
      </div>
    </section>

    <section class="zone" id="transcribeZone">
      <h2 data-collapsed-hint="available once a model is loaded">Transcribe</h2>
      <div class="zone-body">
        <div class="drop" id="drop">
          <input type="file" id="fileInput" hidden />
          Drop a file here or <strong>click to browse</strong>
          <div id="fileName"></div>
        </div>
        <div class="fields">
          <div class="field">
            <label for="tTask">Task</label>
            <select id="tTask">
              <option value="transcribe">Transcribe</option>
              <option value="translate">Translate to English</option>
            </select>
          </div>
          <div class="field">
            <label for="tLanguage">Language</label>
            <input id="tLanguage" placeholder="auto" />
          </div>
          <div class="field">
            <label for="tFormat">Output format</label>
            <select id="tFormat">
              <option>json</option><option>text</option><option>srt</option>
              <option>vtt</option><option>verbose_json</option>
            </select>
          </div>
          <div class="field">
            <label for="tPrompt">Prompt</label>
            <input id="tPrompt" placeholder="Names, jargon, style hints…" />
          </div>
          <div class="field">
            <label for="tWords">Word timestamps</label>
            <input type="checkbox" id="tWords" />
          </div>
          <div class="field">
            <label for="tVad">Filter silence/noise (VAD)</label>
            <input type="checkbox" id="tVad" checked />
          </div>
          <div class="field">
            <label for="tCondition">Condition on previous text</label>
            <input type="checkbox" id="tCondition" />
          </div>
        </div>
        <div class="controls" style="margin-top:12px">
          <button id="tRun" disabled>Transcribe</button>
        </div>
        <div id="tStatus"></div>
        <div id="tResult" hidden>
          <pre id="tText"></pre>
          <div class="actions">
            <button class="secondary" id="tCopy">Copy</button>
            <button class="secondary" id="tDownload">Download</button>
          </div>
        </div>
      </div>
    </section>

    <section class="zone">
      <h2>Live log</h2>
      <div class="zone-body">
        <div id="log"><div class="empty">No requests yet.</div></div>
      </div>
    </section>
  </main>

  <script>
    let selectedModel = null;
    let state = "idle";
    let selectedFile = null;
    let lastDownload = null;

    async function getJSON(url, opts) {
      const res = await fetch(url, opts);
      if (!res.ok) throw new Error((await res.json()).detail || res.statusText);
      return res.json();
    }

    async function init() {
      const [sys, models] = await Promise.all([
        getJSON("/system"),
        getJSON("/v1/models"),
      ]);
      document.getElementById("hw").textContent =
        `${sys.device.toUpperCase()} · ${sys.compute_type} · ${sys.available_memory_gb} GB available` +
        (sys.gpu_name ? ` · ${sys.gpu_name}` : "");
      document.getElementById("port").value = location.port || "9000";
      renderModels(models.data, sys.recommended_model);
      selectedModel = sys.recommended_model;
      highlight();
      await refreshStatus();
      setInterval(refreshStatus, 2000);
      setInterval(refreshLog, 2000);
    }

    function renderModels(models, recommended) {
      const tbody = document.querySelector("#models tbody");
      tbody.innerHTML = "";
      for (const m of models) {
        const tr = document.createElement("tr");
        tr.className = "model-row" + (m.id === recommended ? " recommended" : "");
        tr.dataset.model = m.id;
        tr.innerHTML = `<td>${m.id}</td><td>~${m.vram_gb}GB</td><td>${m.quality}</td><td>${m.use_case}</td>`;
        tr.onclick = () => { if (state !== "loaded") { selectedModel = m.id; highlight(); } };
        tbody.appendChild(tr);
      }
    }

    function highlight() {
      document.querySelectorAll(".model-row").forEach(tr => {
        tr.classList.toggle("selected", tr.dataset.model === selectedModel);
      });
    }

    async function refreshStatus() {
      const s = await getJSON("/engine/status");
      state = s.state;
      document.getElementById("dot").className = "dot " + s.state;
      document.getElementById("stateText").textContent =
        s.state === "loaded" ? `loaded: ${s.model} (${s.device})` : s.state;
      const btn = document.getElementById("toggle");
      btn.disabled = s.state === "loading";
      btn.textContent = s.state === "loaded" ? "Stop" : "Start";
      btn.className = s.state === "loaded" ? "stop" : "";
      applyPanelStates();
    }

    // Panel active/inactive lifecycle (ADR 0005): purely engine-state driven, not user-toggleable.
    function applyPanelStates() {
      const loaded = state === "loaded";
      document.getElementById("settingsZone").classList.toggle("collapsed", loaded);
      document.getElementById("transcribeZone").classList.toggle("collapsed", !loaded);
      document.getElementById("tRun").disabled = !loaded || !selectedFile;
    }

    async function refreshLog() {
      const { entries } = await getJSON("/engine/log");
      const log = document.getElementById("log");
      if (!entries.length) { log.innerHTML = '<div class="empty">No requests yet.</div>'; return; }
      log.innerHTML = entries.map(e =>
        `<div class="entry"><span>${e.timestamp}</span><span>${e.filename}</span>` +
        `<span>${e.model}</span><span>${e.processing_seconds}s</span>` +
        `<span class="${e.status}">${e.status}</span></div>`
      ).join("");
    }

    document.getElementById("toggle").onclick = async () => {
      const btn = document.getElementById("toggle");
      btn.disabled = true;
      try {
        if (state === "loaded") {
          await getJSON("/engine/unload", { method: "POST" });
        } else {
          await getJSON("/engine/load", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ model: selectedModel }),
          });
        }
      } catch (e) {
        alert(e.message);
      }
      await refreshStatus();
    };

    // --- Transcribe zone ---
    const drop = document.getElementById("drop");
    const fileInput = document.getElementById("fileInput");

    function setFile(file) {
      selectedFile = file;
      document.getElementById("fileName").textContent = file ? file.name : "";
      applyPanelStates();
    }

    drop.onclick = () => fileInput.click();
    fileInput.onchange = () => setFile(fileInput.files[0] || null);
    drop.ondragover = (e) => { e.preventDefault(); drop.classList.add("over"); };
    drop.ondragleave = () => drop.classList.remove("over");
    drop.ondrop = (e) => {
      e.preventDefault();
      drop.classList.remove("over");
      if (e.dataTransfer.files.length) setFile(e.dataTransfer.files[0]);
    };

    document.getElementById("tRun").onclick = async () => {
      if (!selectedFile) return;
      const task = document.getElementById("tTask").value;
      const format = document.getElementById("tFormat").value;
      const lang = document.getElementById("tLanguage").value.trim();
      const prompt = document.getElementById("tPrompt").value.trim();
      const words = document.getElementById("tWords").checked;
      const vad = document.getElementById("tVad").checked;
      const condition = document.getElementById("tCondition").checked;

      const form = new FormData();
      form.append("file", selectedFile);
      form.append("response_format", format);
      form.append("vad_filter", vad);
      form.append("condition_on_previous_text", condition);
      if (prompt) form.append("prompt", prompt);
      if (words) form.append("timestamp_granularities", "word");
      if (task === "transcribe" && lang) form.append("language", lang);

      const url = task === "translate" ? "/v1/audio/translations" : "/v1/audio/transcriptions";
      const runBtn = document.getElementById("tRun");
      const status = document.getElementById("tStatus");
      const resultBox = document.getElementById("tResult");
      runBtn.disabled = true;
      resultBox.hidden = true;
      status.textContent = "Transcribing…";

      try {
        const res = await fetch(url, { method: "POST", body: form });
        if (!res.ok) {
          let msg = res.statusText;
          try { msg = (await res.json()).detail || msg; } catch {}
          throw new Error(msg);
        }
        let text, ext;
        if (format === "json" || format === "verbose_json") {
          const data = await res.json();
          text = format === "json" ? (data.text ?? "") : JSON.stringify(data, null, 2);
          ext = "json";
        } else {
          text = await res.text();
          ext = format === "text" ? "txt" : format;
        }
        const base = selectedFile.name.replace(/\.[^.]+$/, "") || "transcript";
        lastDownload = { content: text, filename: `${base}.${ext}` };
        document.getElementById("tText").textContent = text;
        resultBox.hidden = false;
        status.textContent = "";
      } catch (e) {
        status.textContent = "Error: " + e.message;
      } finally {
        applyPanelStates();
      }
    };

    document.getElementById("tCopy").onclick = () => {
      if (lastDownload) navigator.clipboard.writeText(lastDownload.content);
    };

    document.getElementById("tDownload").onclick = () => {
      if (!lastDownload) return;
      const blob = new Blob([lastDownload.content], { type: "text/plain" });
      const a = document.createElement("a");
      a.href = URL.createObjectURL(blob);
      a.download = lastDownload.filename;
      a.click();
      URL.revokeObjectURL(a.href);
    };

    init().catch(e => { document.getElementById("hw").textContent = "Error: " + e.message; });
  </script>
</body>
</html>
